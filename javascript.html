<script>
  let areaCount = 1;
  let currentQuote = null;
  const maxAreas = 7;

  // 台灣縣市資料 (僅限定台北、新北、基隆、桃園、新竹)
  const taiwanAddresses = {
    "臺北市": ["中正區", "大同區", "中山區", "松山區", "大安區", "萬華區", "信義區", "士林區", "北投區", "內湖區", "南港區", "文山區"],
    "新北市": ["板橋區", "三重區", "中和區", "永和區", "新莊區", "土城區", "蘆洲區", "樹林區", "鶯歌區", "淡水區", "汐止區", "林口區", "泰山區", "五股區", "八德區"],
    "桃園市": ["桃園區", "中壢區", "平鎮區", "八德區", "楊梅區", "蘆竹區", "大溪區", "龜山區", "龍潭區", "觀音區", "新屋區", "復興區", "大園區"],
    "基隆市": ["中正區", "信義區", "仁愛區", "中山區", "安樂區", "暖暖區", "七堵區"],
    "新竹市": ["東區", "北區", "香山區"]
  };

  // 初始化
  document.addEventListener('DOMContentLoaded', function() {
    addArea();
    initCities();
  });

  // 初始化縣市選單
  function initCities() {
    const citySelect = document.getElementById('city');
    for (const city in taiwanAddresses) {
      const option = document.createElement('option');
      option.value = city;
      option.textContent = city;
      citySelect.appendChild(option);
    }
  }

  // 根據選擇的縣市更新鄉鎮市區選單
  function updateDistricts() {
    const citySelect = document.getElementById('city');
    const districtSelect = document.getElementById('district');
    const selectedCity = citySelect.value;

    // 清空現有選項
    districtSelect.innerHTML = '';

    if (selectedCity && taiwanAddresses[selectedCity]) {
      // 啟用選單
      districtSelect.disabled = false;
      
      // 新增預設選項
      const defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '請選擇鄉鎮市區';
      districtSelect.appendChild(defaultOption);

      // 新增該縣市的鄉鎮市區
      taiwanAddresses[selectedCity].forEach(district => {
        const option = document.createElement('option');
        option.value = district;
        option.textContent = district;
        districtSelect.appendChild(option);
      });
    } else {
      // 停用選單
      districtSelect.disabled = true;
      const defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '請先選擇縣市';
      districtSelect.appendChild(defaultOption);
    }

    // 清空路名門牌
    document.getElementById('street').value = '';
    document.getElementById('address').value = '';
  }

  // 新增區域
  function addArea() {
    if (areaCount >= maxAreas) {
      alert('最多只能新增7個區域');
      return;
    }

    const container = document.getElementById('areasContainer');
    const areaHtml = `
      <div class="area-card" id="area${areaCount}">
        <button type="button" class="remove-btn" onclick="removeArea(${areaCount})">&times;</button>
        <h3>區域 ${areaCount}</h3>
        <div class="area-inputs">
          <div class="form-group">
            <label>長邊 (公分) <span class="required">*</span></label>
            <input type="number" id="length${areaCount}" name="length${areaCount}" 
                   min="1" required placeholder="0">
          </div>
          <div class="form-group">
            <label>短邊 (公分) <span class="required">*</span></label>
            <input type="number" id="width${areaCount}" name="width${areaCount}" 
                   min="1" required placeholder="0">
          </div>
          <div class="form-group">
            <label>開孔數量</label>
            <input type="number" id="holes${areaCount}" name="holes${areaCount}" 
                   min="0" value="0" placeholder="0">
          </div>
        </div>
      </div>
    `;

    container.insertAdjacentHTML('beforeend', areaHtml);
    areaCount++;
  }

  // 移除區域
  function removeArea(index) {
    const area = document.getElementById(`area${index}`);
    if (area) {
      area.remove();
    }
  }

  // 驗證表單
  function validateForm() {
    const form = document.getElementById('quoteForm');
    const areas = form.querySelectorAll('.area-card');
    
    if (areas.length === 0) {
      alert('請至少新增一個安裝區域');
      return false;
    }

    let hasValidArea = false;
    areas.forEach(area => {
      const lengthInput = area.querySelector('[name^="length"]');
      const widthInput = area.querySelector('[name^="width"]');
      
      if (lengthInput.value && widthInput.value) {
        hasValidArea = true;
      }
    });

    if (!hasValidArea) {
      alert('請至少填寫一個完整的區域資料（長邊和短邊）');
      return false;
    }

    return form.checkValidity();
  }

  // 取得表單資料
  function getFormData() {
    const form = document.getElementById('quoteForm');
    const formData = new FormData(form);
    const data = {};
    
    for (let [key, value] of formData.entries()) {
      if (value) {
        data[key] = value;
      }
    }

    // 組合完整地址
    const city = document.getElementById('city').value;
    const district = document.getElementById('district').value;
    const street = document.getElementById('street').value;
    if (city && district && street) {
      data.address = city + district + street;
    }

    // 檢查各區域
    for (let i = 1; i <= maxAreas; i++) {
      const length = document.getElementById(`length${i}`);
      const width = document.getElementById(`width${i}`);
      const holes = document.getElementById(`holes${i}`);
      
      if (length && width && length.value && width.value) {
        data[`length${i}`] = length.value;
        data[`width${i}`] = width.value;
        data[`holes${i}`] = holes ? holes.value : 0;
      }
    }

    return data;
  }

  // 預覽報價
  function calculatePreview() {
    if (!validateForm()) {
      return;
    }

    const formData = getFormData();
    showLoading(true);

    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (result.success) {
          currentQuote = result;
          displayQuote(result);
          openModal();
        } else {
          alert('計算報價失敗：' + result.error);
        }
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        alert('發生錯誤：' + error.message);
      })
      .calculateQuote(formData);
  }

  // 顯示報價單
  function displayQuote(quote) {
    const display = document.getElementById('quoteDisplay');
    
    // 區域資料
    let areasHtml = '';
    quote.areas.forEach(area => {
      const tier = area.pricePerCm === 100 ? '短邊≤89cm' : 
                   area.pricePerCm === 130 ? '短邊89-119cm' : '短邊>119cm';
      
      areasHtml += `
        <tr>
          <td>${area.length} × ${area.width}</td>
          <td>${tier}</td>
          <td>${area.pricePerCm}</td>
          <td>$${area.panelPrice.toLocaleString()}</td>
          <td>${area.holes}</td>
          <td>$${area.holePrice.toLocaleString()}</td>
          <td>${area.perimeter}</td>
          <td>$${area.edgePrice.toLocaleString()}</td>
          <td><strong>$${area.total.toLocaleString()}</strong></td>
        </tr>
      `;
    });

    display.innerHTML = `
      <h2 class="quote-title">📋 報價單</h2>
      
      <div class="quote-section">
        <h4>👤 客戶資訊</h4>
        <div class="customer-info">
          <p><strong>姓名：</strong>${quote.customer.name}</p>
          <p><strong>電話：</strong>${quote.customer.phone}</p>
          <p><strong>地址：</strong>${quote.customer.address}</p>
        </div>
      </div>

      <div class="quote-section">
        <h4>📐 報價明細</h4>
        <table class="area-table">
          <thead>
            <tr>
              <th>尺寸(長×寬)</th>
              <th>計價方式</th>
              <th>單價</th>
              <th>壁板</th>
              <th>開孔</th>
              <th>開孔費</th>
              <th>周長</th>
              <th>收邊條</th>
              <th>小計</th>
            </tr>
          </thead>
          <tbody>
            ${areasHtml}
          </tbody>
        </table>
      </div>

      <div class="quote-total">
        <div class="row">
          <span>小計：</span>
          <span>$${quote.subtotal.toLocaleString()}</span>
        </div>
        <div class="row">
          <span>稅金 (5%)：</span>
          <span>$${quote.tax.toLocaleString()}</span>
        </div>
        <div class="row total-row">
          <span>總計：</span>
          <span>$${quote.total.toLocaleString()}</span>
        </div>
      </div>

      <div class="bank-info">
        <h4>🏦 匯款資訊</h4>
        <div class="bank-detail">
          <p>銀行：${quote.bank.name} (${quote.bank.code})</p>
          <p>帳號：<strong>${quote.bank.account}</strong></p>
        </div>
      </div>
    `;
  }

  // 確認報價
  function confirmQuote() {
    if (!currentQuote) {
      alert('沒有報價資料');
      return;
    }

    showLoading(true);

    google.script.run
      .withSuccessHandler(function(result) {
        showLoading(false);
        if (result.success) {
          showSuccessMessage();
        } else {
          alert('儲存失敗：' + result.error);
        }
      })
      .withFailureHandler(function(error) {
        showLoading(false);
        alert('發生錯誤：' + error.message);
      })
      .saveCustomer(currentQuote);
  }

  // 顯示成功訊息
  function showSuccessMessage() {
    const display = document.getElementById('quoteDisplay');
    display.innerHTML = `
      <div class="success-message">
        <div class="checkmark">✓</div>
        <h3>報價已確認！</h3>
        <p>感謝您的填寫，我們會盡快與您聯繫。</p>
        <p><strong>報價總金額：$${currentQuote.total.toLocaleString()}</strong></p>
        <p style="margin-top: 20px; color: #888;">請依據上述匯款資訊進行匯款，謝謝！</p>
      </div>
    `;
    
    // 隱藏按鈕
    document.querySelector('.modal-actions').style.display = 'none';
  }

  // 表單提交
  function handleSubmit(event) {
    event.preventDefault();
    calculatePreview();
  }

  // Modal 控制
  function openModal() {
    document.getElementById('quoteModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('quoteModal').style.display = 'block'; // 先隱藏
    setTimeout(() => {
      document.getElementById('quoteModal').style.display = 'none';
      document.body.style.overflow = 'auto';
      // 重置 Modal 狀態
      document.querySelector('.modal-actions').style.display = 'flex';
    }, 100);
  }

  // 點擊背景關閉
  window.onclick = function(event) {
    const modal = document.getElementById('quoteModal');
    if (event.target === modal) {
      closeModal();
    }
  }

  // 載入控制
  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
  }
</script>
