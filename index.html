<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <?!= include('css'); ?>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🏠 琺瑯壁板報價系統</h1>
      <p class="subtitle">輸入您的安裝需求，我們立即為您報價</p>
    </header>

    <form id="quoteForm" onsubmit="handleSubmit(event)">
      <!-- 客戶資料區 -->
      <section class="section">
        <h2>👤 客戶資料</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="name">姓名 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required placeholder="請輸入姓名">
          </div>
          <div class="form-group">
            <label for="phone">電話 <span class="required">*</span></label>
            <input type="tel" id="phone" name="phone" required placeholder="0912345678">
          </div>
          <div class="form-group full-width">
            <label>安裝地址 <span class="required">*</span></label>
            <div class="address-grid">
              <div class="form-group">
                <label for="city">縣市 <span class="required">*</span></label>
                <select id="city" name="city" required onchange="updateDistricts()">
                  <option value="">請選擇縣市</option>
                </select>
              </div>
              <div class="form-group">
                <label for="district">鄉鎮市區 <span class="required">*</span></label>
                <select id="district" name="district" required disabled>
                  <option value="">請先選擇縣市</option>
                </select>
              </div>
              <div class="form-group">
                <label for="street">路名及門牌號碼 <span class="required">*</span></label>
                <input type="text" id="street" name="street" required placeholder="如：忠孝東路一段100號">
              </div>
            </div>
            <input type="hidden" id="address" name="address">
          </div>
        </div>
      </section>

      <!-- 安裝區域區 -->
      <section class="section">
        <h2>📐 安裝區域 (最多7區)</h2>
        <p class="section-desc">每個區域需輸入長度、寬度(短邊)及開孔數量</p>
        
        <div id="areasContainer">
          <!-- 區域會動態生成 -->
        </div>
        
        <button type="button" class="btn btn-secondary" onclick="addArea()">
          + 新增區域
        </button>
      </section>

      <!-- 報價說明 -->
      <section class="section info-section">
        <h3>📋 報價說明</h3>
        <ul class="price-info">
          <li>短邊 ≤ 89cm：長邊 × 100元/公分</li>
          <li>短邊 89-119cm：長邊 × 130元/公分</li>
          <li>短邊 > 119cm：長邊 × 160元/公分</li>
          <li>開孔：每個 300元</li>
          <li>收邊條：每公分 1.5元 (依區域周長計算)</li>
          <li><strong>以上皆含稅含運</strong></li>
        </ul>
      </section>

      <div class="button-group">
        <button type="button" class="btn btn-secondary" onclick="calculatePreview()">
          👁️ 預覽報價
        </button>
        <button type="submit" class="btn btn-primary">
          📧 確認報價並提交
        </button>
      </div>
    </form>

    <!-- 報價單 Modal -->
    <div id="quoteModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        
        <div id="quoteDisplay">
          <!-- 報價單內容 -->
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">
            ← 修改資料
          </button>
          <button type="button" class="btn btn-primary" onclick="confirmQuote()">
            ✓ 確認報價
          </button>
        </div>
      </div>
    </div>

    <!-- 載入中 -->
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>計算報價中...</p>
    </div>
  </div>

  <?!= include('javascript'); ?>
</body>
</html>
